name: cleanup-video-cadmus-passage
on:
  schedule:
    - cron: '12 9 10 4 *'
  workflow_dispatch:
jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete video file
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X DELETE \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/georgie357/georgie357.github.io/contents/videos/passage-final.mp4" \
            -d '{"message":"cleanup: delete passage-final.mp4 after 24h","sha":"b8a8789a38f7381df5ed52d449398a2b535f7736"}'
      - name: Delete this workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WSHA=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/georgie357/georgie357.github.io/contents/.github/workflows/cleanup-video-cadmus-passage.yml" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")
          curl -s -X DELETE \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/georgie357/georgie357.github.io/contents/.github/workflows/cleanup-video-cadmus-passage.yml" \
            -d "{\"message\":\"cleanup: remove cleanup-video-cadmus-passage after execution\",\"sha\":\"$WSHA\"}"
