name: Verify Blog Post Published

on:
  push:
    branches:
      - main
  schedule:
    # Every Tuesday at 17:00 UTC (10 AM Pacific) — 2 hours after publish fires at 15:00 UTC
    - cron: '0 17 * * 2'
  workflow_dispatch:
    inputs:
      week_override:
        description: 'Week to verify (1-12). Leave blank to auto-calculate.'
        required: false
        default: ''

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write   # needed to open an alert issue

    steps:
      - name: Check if Monday post went live
        id: check
        run: |
          python3 << 'PYEOF'
          import datetime
          import os
          import sys
          import urllib.request
          import urllib.error

          # Only run on schedule or workflow_dispatch; exit cleanly on push
          event = os.environ.get('GITHUB_EVENT_NAME', '')
          if event not in ('schedule', 'workflow_dispatch'):
              print(f"Triggered by '{event}' — not a scheduled or manual run. Nothing to do.")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  print("skip=true", file=f)
              sys.exit(0)

          # --- Determine which week should be live ---
          week_override = os.environ.get('WEEK_OVERRIDE', '').strip()
          if week_override:
              week_num = int(week_override)
          else:
              today = datetime.date.today()   # Tuesday
              yesterday = today - datetime.timedelta(days=1)  # Monday

              publish_schedule = {
                  datetime.date(2026, 4,  6): 1,
                  datetime.date(2026, 4, 13): 2,
                  datetime.date(2026, 4, 20): 3,
                  datetime.date(2026, 4, 27): 4,
                  datetime.date(2026, 5,  4): 5,
                  datetime.date(2026, 5, 11): 6,
                  datetime.date(2026, 5, 18): 7,
                  datetime.date(2026, 5, 25): 8,
                  datetime.date(2026, 6,  1): 9,
                  datetime.date(2026, 6,  8): 10,
                  datetime.date(2026, 6, 15): 11,
                  datetime.date(2026, 6, 22): 12,
              }

              if yesterday not in publish_schedule:
                  print(f"No post was scheduled for {yesterday}. Nothing to verify.")
                  with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                      print("skip=true", file=f)
                  sys.exit(0)

              week_num = publish_schedule[yesterday]

          slugs = {
               1: 'blog-who-was-penthesilea.html',
               2: 'blog-real-myth-bellerophon.html',
               3: 'blog-hecuba-troy.html',
               4: 'blog-achilles-penthesilea.html',
               5: 'blog-what-is-iliad-about.html',
               6: 'blog-women-trojan-war.html',
               7: 'blog-hercules-guilt.html',
               8: 'blog-mythology-madeline-miller.html',
               9: 'blog-pegasus.html',
              10: 'blog-why-hecuba-matters.html',
              11: 'blog-amazons-greek-mythology.html',
              12: 'blog-where-to-start-greek-mythology.html',
          }

          slug = slugs[week_num]
          url  = f'https://georgealexandervela.com/{slug}'

          print(f"Checking week {week_num}: {url}")
          try:
              req  = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              resp = urllib.request.urlopen(req, timeout=15)
              code = resp.getcode()
              if code == 200:
                  print(f"[OK] Week {week_num} is live: HTTP {code}")
                  with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                      print("skip=true", file=f)
                      print(f"week_num={week_num}", file=f)
                      print(f"slug={slug}", file=f)
              else:
                  print(f"[FAIL] Week {week_num} returned HTTP {code}")
                  with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                      print("skip=false", file=f)
                      print(f"week_num={week_num}", file=f)
                      print(f"slug={slug}", file=f)
          except urllib.error.HTTPError as e:
              print(f"[FAIL] Week {week_num} returned HTTP {e.code}")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  print("skip=false", file=f)
                  print(f"week_num={week_num}", file=f)
                  print(f"slug={slug}", file=f)
          except Exception as e:
              print(f"[FAIL] Could not reach {url}: {e}")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  print("skip=false", file=f)
                  print(f"week_num={week_num}", file=f)
                  print(f"slug={slug}", file=f)
          PYEOF
        env:
          WEEK_OVERRIDE: ${{ github.event.inputs.week_override }}

      - name: Open GitHub issue if post is missing
        if: steps.check.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const week = '${{ steps.check.outputs.week_num }}';
            const slug = '${{ steps.check.outputs.slug }}';
            const url  = `https://georgealexandervela.com/${slug}`;

            // Check for an existing open issue for this week
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: 'blog-publish-failure',
            });

            const existing = issues.data.find(i => i.title.includes(`Week ${week}`));
            if (existing) {
              console.log(`Issue already open: #${existing.number}. Skipping.`);
              return;
            }

            const body = [
              '## Scheduled blog post did not publish',
              '',
              'Week: ' + week,
              'Expected URL: ' + url,
              'Status: Not live (HTTP 404 or unreachable)',
              '',
              '### What happened',
              'The publish workflow either failed silently or the post is not yet live.',
              '',
              '### How to fix',
              '',
              'Re-trigger the publish workflow:',
              '```',
              'gh workflow run publish-post.yml --repo georgie357/georgie357.github.io --field week_override=' + week,
              '```',
              '',
              'Or go to Actions > Publish Scheduled Blog Post > Run workflow and set week_override to ' + week,
              '',
              '### After fixing',
              'Close this issue once confirmed live at: ' + url,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: 'Blog post Week ' + week + ' did not publish on schedule',
              labels: ['blog-publish-failure'],
              body: body,
            });

            console.log(`Issue created for week ${week}`);
