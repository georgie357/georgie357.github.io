          campaign_id = campaign['data']['id']
          print(f"Campaign created: id={campaign_id}")

          # --- 4. Schedule for immediate delivery ---
          print("Scheduling campaign for immediate delivery...")
          api('POST', f'/campaigns/{campaign_id}/schedule', {'delivery': 'instant'})
          print(f"Campaign sent. Post: {post_url}")
          PYEOF
        env:
          MAILERLITE_API_KEY: ${{ secrets.MAILERLITE_API_KEY }}
          WEEK_NUM: ${{ steps.publish.outputs.week_num }}
