name: Publish Scheduled Blog Post

on:
  push:
    branches:
      - main
  schedule:
    # Every Tuesday at 8:00 AM Pacific (15:00 UTC during PDT)
    - cron: '0 15 * * 2'
  workflow_dispatch:
    inputs:
      week_override:
        description: 'Override week number (1-12). Leave blank to calculate automatically.'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Calculate week and publish post
        id: publish
        run: |
          python3 << 'PYEOF'
          import datetime
          import os
          import sys

          # Only run on schedule or workflow_dispatch; exit cleanly on push
          event = os.environ.get('GITHUB_EVENT_NAME', '')
          if event not in ('schedule', 'workflow_dispatch'):
              print(f"Triggered by '{event}' — not a scheduled or manual run. Nothing to do.")
              sys.exit(0)

          # --- Determine week number ---
          week_override = os.environ.get('WEEK_OVERRIDE', '').strip()
          if week_override:
              try:
                  week_num = int(week_override)
              except ValueError:
                  print(f"Invalid week override: {week_override}")
                  sys.exit(1)
          else:
              today = datetime.date.today()

              # Map each Monday publish date to its week number.
              # Week 1 was published manually on 2026-04-06 (Monday launch).
              # Weeks 2-12 publish on Mondays at 9 AM UTC.
              publish_schedule = {
                  # Week 2 published manually Mon Apr 13 (before Tuesday optimization)
                  # Weeks 3-12 shifted to Tuesday 8AM Pacific per research recommendation
                  datetime.date(2026, 4, 21): 3,   # Tue Apr 21  — Hecuba of Troy
                  datetime.date(2026, 4, 28): 4,   # Tue Apr 28  — Achilles & Penthesilea
                  datetime.date(2026, 5,  5): 5,   # Tue May 5   — What Is the Iliad About
                  datetime.date(2026, 5, 12): 6,   # Tue May 12  — Women the Trojan War Forgot
                  datetime.date(2026, 5, 19): 7,   # Tue May 19  — Hercules and Guilt
                  datetime.date(2026, 5, 26): 8,   # Tue May 26  — Madeline Miller reading guide
                  datetime.date(2026, 6,  2): 9,   # Tue Jun 2   — Pegasus
                  datetime.date(2026, 6,  9): 10,  # Tue Jun 9   — Why Hecuba Matters
                  datetime.date(2026, 6, 16): 11,  # Tue Jun 16  — Amazons
                  datetime.date(2026, 6, 23): 12,  # Tue Jun 23  — Where to Start
              }

              if today not in publish_schedule:
                  print(f"No post scheduled for {today} (not a scheduled Monday). Nothing to publish.")
                  sys.exit(0)

              week_num = publish_schedule[today]

          print(f"Calculated week number: {week_num}")

          if week_num < 1 or week_num > 12:
              print(f"Week {week_num} is outside the scheduled range (1-12). Nothing to publish.")
              sys.exit(0)

          # --- Post manifest: (scheduled filename, live filename, publish date display) ---
          posts = {
               1: ('week-01-who-was-penthesilea.html',            'blog-who-was-penthesilea.html',        '6 April 2026'),
               2: ('week-02-real-myth-bellerophon.html',          'blog-real-myth-bellerophon.html',      '13 April 2026'),
               3: ('week-03-hecuba-troy.html',                    'blog-hecuba-troy.html',                '20 April 2026'),
               4: ('week-04-achilles-penthesilea.html',           'blog-achilles-penthesilea.html',       '27 April 2026'),
               5: ('week-05-what-is-iliad-about.html',            'blog-what-is-iliad-about.html',        '4 May 2026'),
               6: ('week-06-women-trojan-war.html',               'blog-women-trojan-war.html',           '11 May 2026'),
               7: ('week-07-hercules-guilt.html',                 'blog-hercules-guilt.html',             '18 May 2026'),
               8: ('week-08-mythology-madeline-miller.html',      'blog-mythology-madeline-miller.html',  '25 May 2026'),
               9: ('week-09-pegasus.html',                        'blog-pegasus.html',                    '1 June 2026'),
              10: ('week-10-why-hecuba-matters.html',             'blog-why-hecuba-matters.html',         '8 June 2026'),
              11: ('week-11-amazons-greek-mythology.html',        'blog-amazons-greek-mythology.html',    '15 June 2026'),
              12: ('week-12-where-to-start-greek-mythology.html', 'blog-where-to-start-greek-mythology.html', '22 June 2026'),
          }

          src_file, dst_file, pub_date = posts[week_num]
          src_path = f'scheduled-posts/{src_file}'
          dst_path = dst_file

          # --- Check source exists ---
          if not os.path.exists(src_path):
              print(f"ERROR: Source file not found: {src_path}")
              sys.exit(1)

          # --- Copy and fix relative paths ---
          with open(src_path, 'r', encoding='utf-8') as f:
              content = f.read()

          # Scheduled posts use ../ relative paths; fix for root deployment
          content = content.replace('href="../', 'href="')
          content = content.replace('src="../', 'src="')

          with open(dst_path, 'w', encoding='utf-8') as f:
              f.write(content)

          print(f"Published: {src_path} -> {dst_path}")

          # --- Update blog.html: insert new article at top of grid ---
          blog_path = 'blog.html'
          with open(blog_path, 'r', encoding='utf-8') as f:
              blog = f.read()

          categories = {1:'Greek Mythology',2:'Greek Mythology',3:'Greek Mythology',4:'Greek Mythology',5:'Greek Mythology',6:'Greek Mythology',7:'Greek Mythology',8:'Reading Guide',9:'Greek Mythology',10:'Greek Mythology',11:'Greek Mythology',12:'Reading Guide'}
          titles = {
               2: "The Real Myth of Bellerophon: Why He Fell From Heaven",
               3: "Hecuba of Troy: The Queen Behind the War",
               4: "Achilles and Penthesilea: The Love Story History Ignored",
               5: "What Is the Iliad Actually About?",
               6: "The Women the Trojan War Forgot",
               7: "Hercules and Guilt: What the Myths Never Say Directly",
               8: "Greek Mythology Books for Fans of Madeline Miller",
               9: "Pegasus: The Horse That Was Never Just a Horse",
              10: "Why Hecuba Matters: Grief, Power, and Vengeance in Troy",
              11: "The Amazons: What Greek Mythology Got Wrong",
              12: "Where to Start With Greek Mythology Retellings",
          }
          excerpts = {
              2: "Bellerophon tamed Pegasus, killed the Chimera, and survived three attempts to kill him. The myth everyone remembers is the fall. The story worth reading is everything that came before it.",
              3: "Hecuba was the most competent person in any room she entered. The myth of the Trojan War is full of gods and heroes; she ran the city that made the war possible for ten years.",
              4: "He killed her in single combat. Then he removed her helmet and saw her face. What the ancient sources say happened next is one of Greek mythology&#8217;s stranger and more honest footnotes.",
              5: "The Iliad covers twenty-three days in year nine of a ten-year war. It is not, technically, a story about the Trojan War. Understanding what it is actually about changes how you read it.",
              6: "The names everyone knows are Achilles, Hector, Odysseus. The women who appear in the margins of the Trojan War have stories the ancient poets found less interesting to record in full.",
              7: "The twelve labours are well known. What they were for &#8212; penance for killing his own family under a god-sent madness &#8212; and what that cost him is the story the myth rarely tells directly.",
              8: "If you finished <em>The Song of Achilles</em> or <em>Circe</em> and found yourself wanting more &#8212; Greek mythology told with literary seriousness &#8212; here is where to go next.",
              9: "Pegasus was born from Medusa&#8217;s blood, flew Bellerophon to his greatest victories, and ended up carrying the thunderbolts of Zeus. The horse&#8217;s trajectory through the myth is more interesting than it first appears.",
             10: "Euripides wrote two plays about Hecuba. Neither of them quite explains what makes her story impossible to look away from &#8212; which is that she lost everything and still found a way to act.",
             11: "The Amazons appear in every major Greek hero&#8217;s story as opponents to be defeated. What the myths record at the margins &#8212; and what the archaeology suggests &#8212; is considerably more complicated.",
             12: "There are more Greek mythology retellings being published now than at any point since the Renaissance. The question of where to start depends on what you are actually looking for.",
          }

          insertion_anchor = '    <!-- POST-WEEK-01 -->'
          if f'data-week="{week_num}"' in blog:
              print(f"Note: week {week_num} already in blog.html — skipping insert")
          elif insertion_anchor not in blog:
              print(f"ERROR: insertion anchor not found in blog.html")
              sys.exit(1)
          else:
              wk = f"{week_num:02d}"
              cat = categories.get(week_num, 'Greek Mythology')
              exc = excerpts.get(week_num, '')
              title = titles.get(week_num, '')
              a  = f'    <!-- POST-WEEK-{wk} -->\n'
              a += f'    <article class="blog-card" data-week="{week_num}" data-live="true">\n'
              a += f'      <div class="blog-card-meta">\n'
              a += f'        <span class="blog-card-date">{pub_date}</span>\n'
              a += f'        <span class="blog-card-category">{cat}</span>\n'
              a += f'      </div>\n'
              a += f'      <h2 class="blog-card-title">\n'
              a += f'        <a href="{dst_file}">{title}</a>\n'
              a += f'      </h2>\n'
              a += f'      <p class="blog-card-excerpt">{exc}</p>\n'
              a += f'      <a class="blog-card-readmore" href="{dst_file}">Read &#x2192;</a>\n'
              a += f'    </article>\n'
              a += f'    <!-- /POST-WEEK-{wk} -->\n\n'
              blog = blog.replace(insertion_anchor, a + insertion_anchor, 1)
              with open(blog_path, 'w', encoding='utf-8') as f:
                  f.write(blog)
              print(f"Updated blog.html: inserted week {week_num} article")

          # --- Update sitemap.xml: add new URL entry ---
          sitemap_path = 'sitemap.xml'
          with open(sitemap_path, 'r', encoding='utf-8') as f:
              sitemap = f.read()

          _loc = f"https://georgealexandervela.com/{dst_file}"
          _mod = datetime.date.today().isoformat()
          new_url_entry = f"  <url>\n    <loc>{_loc}</loc>\n    <lastmod>{_mod}</lastmod>\n    <changefreq>yearly</changefreq>\n    <priority>0.7</priority>\n  </url>\n"
          # Insert before the about.html entry (or before closing tag)
          if f'/{dst_file}' not in sitemap:
              sitemap = sitemap.replace(
                  '  <url>\n    <loc>https://georgealexandervela.com/about.html</loc>',
                  new_url_entry + '  <url>\n    <loc>https://georgealexandervela.com/about.html</loc>'
              )
              with open(sitemap_path, 'w', encoding='utf-8') as f:
                  f.write(sitemap)
              print(f"Updated sitemap.xml: added {dst_file}")
          else:
              print(f"Note: {dst_file} already in sitemap.xml")

          # --- Update feed.xml: prepend new item ---
          # Brevo RSS Automation reads this feed and auto-emails subscribers.
          import email.utils

          feed_path = 'feed.xml'
          pub_dt    = datetime.datetime.combine(
              datetime.date.today(), datetime.time(15, 0),
              tzinfo=datetime.timezone.utc
          )
          pub_rfc   = email.utils.formatdate(pub_dt.timestamp(), usegmt=True)
          _post_url = f"https://georgealexandervela.com/{dst_file}"

          # Use the title and excerpt from earlier dicts
          _title   = titles.get(week_num, dst_file)
          _excerpt = excerpts.get(week_num, '')
          # Strip HTML tags from excerpt for RSS description
          import re
          _desc = re.sub(r'<[^>]+>', '', _excerpt)

          new_item = f"""  <item>
    <title>{_title}</title>
    <link>{_post_url}</link>
    <guid isPermaLink="true">{_post_url}</guid>
    <pubDate>{pub_rfc}</pubDate>
    <description>{_desc}</description>
  </item>"""

          if not os.path.exists(feed_path):
              # Create the feed from scratch
              feed_content = f"""<?xml version="1.0" encoding="UTF-8"?>
<rss version="2.0" xmlns:atom="http://www.w3.org/2005/Atom">
  <channel>
    <title>From the Mythology Notes — George Alexander Vela</title>
    <link>https://georgealexandervela.com/blog.html</link>
    <description>Essays on Greek mythology by George Alexander Vela.</description>
    <language>en-us</language>
    <atom:link href="https://georgealexandervela.com/feed.xml" rel="self" type="application/rss+xml"/>
{new_item}
  </channel>
</rss>"""
              with open(feed_path, 'w', encoding='utf-8') as f:
                  f.write(feed_content)
              print(f"Created feed.xml with week {week_num} item")
          elif _post_url in open(feed_path).read():
              print(f"Note: {dst_file} already in feed.xml")
          else:
              # Prepend new item after <channel> opening tags (before first <item>)
              feed = open(feed_path, 'r', encoding='utf-8').read()
              if '<item>' in feed:
                  feed = feed.replace('  <item>', new_item + '\n  <item>', 1)
              else:
                  feed = feed.replace('</channel>', new_item + '\n  </channel>')
              with open(feed_path, 'w', encoding='utf-8') as f:
                  f.write(feed)
              print(f"Updated feed.xml: prepended week {week_num} item")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as gh_out:
              print(f"week_num={week_num}", file=gh_out)
          print("Done.")
          PYEOF
        env:
          WEEK_OVERRIDE: ${{ github.event.inputs.week_override }}

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Publish scheduled blog post — week ${{ steps.publish.outputs.week_num }}"
            # Pull --rebase in case another commit landed since checkout
            git pull --rebase origin main
            git push
          fi

      - name: Verify blog post is live
        if: steps.publish.outputs.week_num != ''
        run: |
          python3 << 'PYEOF'
          import os
          import sys
          import time
          import urllib.request
          import urllib.error

          WEEK_NUM = int(os.environ['WEEK_NUM'])

          # Known blog post slugs
          slugs = {
               1: 'blog-who-was-penthesilea.html',
               2: 'blog-real-myth-bellerophon.html',
               3: 'blog-hecuba-troy.html',
               4: 'blog-achilles-penthesilea.html',
               5: 'blog-what-is-iliad-about.html',
               6: 'blog-women-trojan-war.html',
               7: 'blog-hercules-guilt.html',
               8: 'blog-mythology-madeline-miller.html',
               9: 'blog-pegasus.html',
              10: 'blog-why-hecuba-matters.html',
              11: 'blog-amazons-greek-mythology.html',
              12: 'blog-where-to-start-greek-mythology.html',
          }

          # Known title keywords per week (safety check — wrong content detection)
          expected_keywords = {
               1: 'penthesilea',  2: 'bellerophon',  3: 'hecuba',
               4: 'achilles',     5: 'iliad',        6: 'women',
               7: 'hercules',     8: 'miller',       9: 'pegasus',
              10: 'hecuba',      11: 'amazon',       12: 'mythology',
          }

          slug = slugs.get(WEEK_NUM)
          if not slug:
              print(f"No slug for week {WEEK_NUM}")
              sys.exit(1)

          url = f'https://georgealexandervela.com/{slug}'
          keyword = expected_keywords.get(WEEK_NUM, '')

          # Wait for GitHub Pages to deploy (up to 3 minutes)
          print(f"Verifying blog post: {url}")
          for attempt in range(6):
              if attempt > 0:
                  print(f"  Retry {attempt}/5 (waiting 30s for GitHub Pages deploy)...")
                  time.sleep(30)
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'publish-post-verify'})
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      body = resp.read().decode('utf-8', errors='replace')
                      status = resp.status

                      if status != 200:
                          print(f"  [FAIL] HTTP {status}")
                          continue

                      # Safety: verify correct content published (not wrong week's post)
                      if keyword and keyword.lower() not in body.lower():
                          print(f"  [DANGER] Page is live but does NOT contain expected keyword '{keyword}'!")
                          print(f"  This may mean the wrong post was published. Manual review needed.")
                          sys.exit(1)

                      # Check page has real content (not empty/broken)
                      if len(body) < 5000:
                          print(f"  [WARN] Page is only {len(body)} bytes — suspiciously small")
                          continue

                      print(f"  [OK] Blog post verified: HTTP {status}, {len(body)} bytes, keyword '{keyword}' found")
                      sys.exit(0)

              except urllib.error.HTTPError as e:
                  print(f"  HTTP {e.code} — page may not be deployed yet")
              except Exception as e:
                  print(f"  Error: {e}")

          print(f"  [FAIL] Blog post not accessible after 3 minutes. Check GitHub Pages deployment.")
          sys.exit(1)
          PYEOF
        env:
          WEEK_NUM: ${{ steps.publish.outputs.week_num }}

      - name: Verify blog.html updated
        if: steps.publish.outputs.week_num != ''
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import os
          import time

          WEEK_NUM = int(os.environ['WEEK_NUM'])

          # Wait a moment for pages to update
          time.sleep(10)

          url = 'https://georgealexandervela.com/blog.html'
          try:
              req = urllib.request.Request(url, headers={'User-Agent': 'publish-post-verify'})
              with urllib.request.urlopen(req, timeout=15) as resp:
                  body = resp.read().decode('utf-8', errors='replace')
                  if f'data-week="{WEEK_NUM}"' in body:
                      print(f"[OK] blog.html contains week {WEEK_NUM} card")
                  else:
                      print(f"[WARN] blog.html does NOT contain week {WEEK_NUM} card yet (may need more deploy time)")
          except Exception as e:
              print(f"[WARN] Could not verify blog.html: {e}")
          PYEOF
        env:
          WEEK_NUM: ${{ steps.publish.outputs.week_num }}

      # Email is handled automatically by Brevo RSS Automation (feed.xml → Brevo → subscribers).
      # No manual campaign step needed.
